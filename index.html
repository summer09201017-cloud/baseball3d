<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#12321f" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <title>3D 棒球・主審視角 Baseball 3D</title>
  </head>
  <body>
    <main class="app-shell">
      <canvas id="gameCanvas" aria-label="3D 棒球遊戲畫面"></canvas>

      <!-- 記分 HUD -->
      <header class="scoreboard">
        <div class="team home">
          <span class="team-name" id="homeName">你</span>
          <span class="team-score" id="homeScore">0</span>
        </div>
        <div class="mid">
          <span id="inningLabel">—</span>
          <span id="modeLabel" class="mode-label">打擊練習</span>
        </div>
        <div class="team away">
          <span class="team-score" id="awayScore">0</span>
          <span class="team-name" id="awayName">阿福</span>
        </div>
      </header>

      <!-- B/S/O 燈號 -->
      <div class="count-panel" id="countPanel">
        <div class="count-row"><span>壞球</span><div class="lights" id="ballLights"></div></div>
        <div class="count-row"><span>好球</span><div class="lights" id="strikeLights"></div></div>
        <div class="count-row"><span>出局</span><div class="lights" id="outLights"></div></div>
      </div>

      <!-- 投手選球面板 -->
      <div class="pitch-panel" id="pitchPanel" hidden>
        <div id="pitchHint">W/S 高低 ・ A/D 左右 ・ Q/E 球種 ・ 空白鍵投球 ・ V 視角</div>
        <div id="pitchSel">球種:🔥 快速球</div>
      </div>

      <div class="message-ribbon" id="statusMessage">選擇模式後開始比賽。</div>
      <div class="commentary-bar" id="commentaryBar" hidden></div>

      <!-- 觸控 -->
      <div class="touch-controls" id="touchControls">
        <button id="touchAction" class="touch-action">揮棒!</button>
      </div>

      <div class="hud-buttons">
        <button id="menuButton">選單</button>
        <button id="audioButton">音效開啟</button>
        <button id="cameraButton">視角</button>
      </div>

      <!-- 結算 -->
      <div class="overlay-shell" id="matchOverlay">
        <div class="overlay-card">
          <p class="overlay-eyebrow" id="overlayEyebrow">比賽結束</p>
          <h2 id="overlayTitle">—</h2>
          <p id="overlayText">—</p>
          <div class="overlay-actions">
            <button id="overlayMenuButton">回選單</button>
            <button id="overlayReplayButton">再來一場</button>
          </div>
        </div>
      </div>

      <!-- 主選單 -->
      <div class="home-screen visible" id="homeScreen">
        <div class="home-card">
          <p class="home-eyebrow">BASEBALL 3D・主審視角</p>
          <h1>3D 棒球</h1>
          <p class="home-sub">球從投手丘朝你飛來——看清好壞球,抓準時機揮棒!</p>

          <div class="mode-grid" id="modeCardGrid">
            <button class="mode-card selected" data-mode="practice">
              <strong>🤖 打擊練習</strong><span>阿福投球你打——球數自訂,看總分拿星</span>
            </button>
            <button class="mode-card" data-mode="pitchduel">
              <strong>🎯 投球挑戰</strong><span>你投球,阿福打擊——九宮格鬥智</span>
            </button>
            <button class="mode-card" data-mode="match3">
              <strong>⚾ 短場對戰</strong><span>3 局攻防:上半你打、下半你投</span>
            </button>
            <button class="mode-card" data-mode="duel2p">
              <strong>👥 雙人同機</strong><span>投打輪流 PK,3 局定勝負</span>
            </button>
            <button class="mode-card" data-mode="racerun">
              <strong>🏁 搶分對戰</strong><span>無局數上限——先得目標分獲勝(分數自訂)</span>
            </button>
          </div>

          <div class="home-row">
            <label for="pitchCountInput" id="pitchCountLabel">球數</label>
            <input id="pitchCountInput" type="number" min="1" max="30" value="10" />
            <label for="inningsInput" id="inningsLabel" hidden>局數</label>
            <input id="inningsInput" type="number" min="1" max="9" value="3" hidden />
            <label for="targetRunsInput" id="targetRunsLabel" hidden>目標分</label>
            <input id="targetRunsInput" type="number" min="1" max="30" value="5" hidden />
            <label for="difficultySelect">難度</label>
            <select id="difficultySelect">
              <option value="kids">幼兒（超簡單）</option>
              <option value="child">兒童（簡單）</option>
              <option value="easy" selected>入門</option>
              <option value="normal">標準</option>
              <option value="hard">職業</option>
            </select>
            <label for="audioSelect">音效</label>
            <select id="audioSelect">
              <option value="on" selected>開啟</option>
              <option value="off">靜音</option>
            </select>
          </div>

          <p class="home-hint" id="modeHint">球到本壘上方(最大)時揮棒:空白鍵/Enter/點畫面。壞球別揮,四壞保送!</p>
          <button class="start-button" id="startMatchButton">開始比賽</button>
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
